name: VibeCode Security Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build scanner
        run: pnpm build

      - name: Run VibeCode Security Scan
        run: pnpm cli scan . --ci --format json --output scan-report.json --threshold 70

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: scan-report.json
